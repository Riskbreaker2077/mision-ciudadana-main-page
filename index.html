  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

ace {\n  font-family: 'Space Grotesk';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"e669305e-8eba-4484-921f-bcc4058df7e8\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Space Grotesk';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"f29f275d-d3b0-4d93-b65d-b39f529a81e2\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'VT323';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"cd033b72-13bc-49d8-81d1-c285e6129c5c\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'VT323';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"56f6e53a-dc17-4ea9-9823-9c2ed82b1396\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'VT323';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"cbdc9b0c-4a66-4f56-ba9a-59dd52b2effa\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n/* ─────────────────────────────────────────────────────────\n   MISIÓN CIUDADANA — MAIN PAGE\n   Paleta maestra extraída del logo:\n   magenta · púrpura · amarillo · cian · coral · violeta-noche\n   ───────────────────────────────────────────────────────── */\n:root {\n  --bg:         #0a0612;\n  --bg-2:       #140a24;\n  --bg-3:       #1d0f3d;\n\n  --ink:        #f4f1de;\n  --ink-dim:    #9d8fb5;\n\n  --magenta:    #ff2e88;\n  --magenta-2:  #ff6b9d;\n  --purple:     #b14aed;\n  --yellow:     #ffd84d;\n  --cyan:       #2dd4d4;\n  --coral:      #ff6f59;\n  --green:      #69d49f;\n\n  --shadow-hard: 4px 4px 0 #000;\n\n  --font-arcade: \"Press Start 2P\", \"VT323\", monospace;\n  --font-mono:   \"VT323\", \"IBM Plex Mono\", monospace;\n  --font-text:   \"Space Grotesk\", system-ui, sans-serif;\n}\n\n* { box-sizing: border-box; }\n\nhtml, body {\n  margin: 0;\n  padding: 0;\n  min-height: 100%;\n  background:\n    radial-gradient(circle at 18% 8%,  rgba(177, 74, 237, 0.10) 0%, transparent 55%),\n    radial-gradient(circle at 82% 92%, rgba(255,  46, 136, 0.08) 0%, transparent 55%),\n    #000000;\n  font-family: var(--font-text);\n  color: var(--ink);\n  overflow-x: hidden;\n}\n\n/* Global scanlines */\nbody::before {\n  content: \"\";\n  position: fixed;\n  inset: 0;\n  pointer-events: none;\n  z-index: 80;\n  background: repeating-linear-gradient(\n    to bottom,\n    rgba(0,0,0,0) 0px,\n    rgba(0,0,0,0) 2px,\n    rgba(0,0,0,0.10) 3px,\n    rgba(0,0,0,0) 4px\n  );\n}\n\n.stage {\n  min-height: 100vh;\n  min-height: 100dvh;\n  display: flex;\n  flex-direction: column;\n  position: relative;\n}\n\n.webapp-shell {\n  flex: 1;\n  width: 100%;\n  max-width: 480px;\n  margin: 0 auto;\n  position: relative;\n  display: flex;\n  flex-direction: column;\n  min-height: 100vh;\n  min-height: 100dvh;\n  box-shadow: 0 0 60px rgba(177, 74, 237, 0.35);\n}\n\n.screen {\n  flex: 1;\n  width: 100%;\n  min-height: 100vh;\n  min-height: 100dvh;\n  background: #000000;\n  color: var(--ink);\n  display: flex;\n  flex-direction: column;\n  position: relative;\n  overflow: hidden;\n}\n\n/* Local scanlines, slightly purple-tinted */\n.screen::before {\n  content: \"\";\n  position: absolute;\n  inset: 0;\n  pointer-events: none;\n  z-index: 50;\n  background: repeating-linear-gradient(\n    to bottom,\n    rgba(0,0,0,0) 0px,\n    rgba(0,0,0,0) 2px,\n    rgba(177, 74, 237, 0.06) 3px,\n    rgba(0,0,0,0) 4px\n  );\n}\n.screen::after {\n  content: \"\";\n  position: absolute;\n  inset: 0;\n  pointer-events: none;\n  z-index: 51;\n  background: radial-gradient(circle at 50% 105%, rgba(255, 46, 136, 0.10), transparent 55%);\n}\n\n.pixel-grid {\n  position: absolute;\n  inset: 0;\n  background-image:\n    linear-gradient(rgba(157, 143, 181, 0.10) 1px, transparent 1px),\n    linear-gradient(90deg, rgba(157, 143, 181, 0.10) 1px, transparent 1px);\n  background-size: 20px 20px;\n  z-index: 0;\n  pointer-events: none;\n}\n\n.screen-body {\n  flex: 1;\n  overflow-y: auto;\n  overflow-x: hidden;\n  padding: 4px 10px 32px;\n  position: relative;\n  z-index: 2;\n  scrollbar-width: none;\n}\n.screen-body::-webkit-scrollbar { display: none; }\n\n/* ── Hero (logo + tagline) ────────────────────────────── */\n.hero {\n  display: flex;\n  flex-direction: column;\n  align-items: center;\n  text-align: center;\n  padding: 0 0 14px;\n  position: relative;\n  margin-top: -30px;\n  margin-left: -10px;\n  margin-right: -10px;\n}\n\n.hero-logo-wrap {\n  position: relative;\n  width: 540px;\n  height: 540px;\n  max-width: 100%;\n  display: grid;\n  place-items: center;\n  margin-bottom: 0;\n}\n\n.hero-logo-wrap::before {\n  content: \"\";\n  position: absolute;\n  inset: 10px;\n  background:\n    radial-gradient(circle, rgba(255, 46, 136, 0.32) 0%, transparent 60%),\n    radial-gradient(circle, rgba(45, 212, 212, 0.22) 0%, transparent 70%);\n  filter: blur(18px);\n  z-index: 0;\n  animation: aura-pulse 4s ease-in-out infinite;\n}\n@keyframes aura-pulse {\n  0%, 100% { opacity: 0.7; transform: scale(1); }\n  50%      { opacity: 1;   transform: scale(1.06); }\n}\n\n.hero-logo {\n  position: relative;\n  z-index: 1;\n  width: 100%;\n  height: 100%;\n  max-width: 520px;\n  max-height: 520px;\n  object-fit: contain;\n  image-rendering: pixelated;\n  filter:\n    drop-shadow(0 0 10px rgba(177, 74, 237, 0.45))\n    drop-shadow(0 0 4px rgba(255, 46, 136, 0.3));\n  animation: float 4s ease-in-out infinite;\n}\n@keyframes float {\n  0%, 100% { transform: translateY(0); }\n  50%      { transform: translateY(-5px); }\n}\n\n.hero-wordmark {\n  font-family: var(--font-arcade);\n  font-size: 22px;\n  letter-spacing: 0.08em;\n  line-height: 1.35;\n  color: var(--ink);\n  text-shadow:\n    0 0 8px rgba(255, 46, 136, 0.6),\n    0 0 18px rgba(177, 74, 237, 0.45),\n    2px 2px 0 #000;\n  margin: 0;\n}\n.hero-wordmark:empty { display: none; }\n.hero-wordmark .wm-l1 { color: var(--magenta); display: block; }\n.hero-wordmark .wm-l2 { color: var(--ink);     display: block; }\n\n.hero-press {\n  font-family: var(--font-arcade);\n  font-size: 16px;\n  letter-spacing: 0.18em;\n  color: var(--yellow);\n  text-shadow: 0 0 10px rgba(255, 216, 77, 0.6);\n  animation: blink 1.1s steps(2, start) infinite;\n  margin-top: -150px;\n  margin-bottom: 10px;\n  position: relative;\n  z-index: 2;\n}\n@keyframes blink { to { visibility: hidden; } }\n\n.hero-sub {\n  font-family: var(--font-mono);\n  font-size: 28px;\n  color: var(--ink);\n  letter-spacing: 0.08em;\n  text-shadow: 0 0 6px rgba(177, 74, 237, 0.35);\n}\n\n/* ── Divider w/ pixel ──────────────────────────────────── */\n.divider {\n  display: flex;\n  align-items: center;\n  gap: 10px;\n  margin: 22px 0 18px;\n  color: var(--ink-dim);\n}\n.divider-line {\n  flex: 1;\n  height: 2px;\n  background-image: linear-gradient(90deg, currentColor 50%, transparent 50%);\n  background-size: 8px 2px;\n  opacity: 0.55;\n}\n.divider-label {\n  font-family: var(--font-arcade);\n  font-size: 10px;\n  letter-spacing: 0.18em;\n  color: var(--magenta);\n  text-shadow: 0 0 8px rgba(255, 46, 136, 0.55);\n}\n\n/* ── Module list ──────────────────────────────────────── */\n.module-list {\n  display: flex;\n  flex-direction: column;\n  gap: 14px;\n  padding: 0 10px;\n}\n\n.module-tile {\n  --accent: var(--magenta);\n  display: grid;\n  grid-template-columns: 64px 1fr auto;\n  align-items: center;\n  gap: 14px;\n  padding: 14px;\n  background: rgba(10, 6, 18, 0.78);\n  border: 2px solid var(--accent);\n  box-shadow: var(--shadow-hard), 4px 4px 0 2px var(--accent);\n  text-decoration: none;\n  color: var(--ink);\n  cursor: pointer;\n  position: relative;\n  transition: transform 0.12s, box-shadow 0.12s, filter 0.12s;\n}\n\n/* Pixel corner dots */\n.module-tile::before, .module-tile::after {\n  content: \"\";\n  position: absolute;\n  width: 6px; height: 6px;\n  background: var(--accent);\n}\n.module-tile::before { top: -4px; left: -4px; }\n.module-tile::after  { bottom: -4px; right: -4px; }\n\n.module-tile:hover {\n  transform: translate(-2px, -2px);\n  box-shadow: 6px 6px 0 #000, 6px 6px 0 2px var(--accent);\n  filter: brightness(1.08);\n}\n.module-tile:active {\n  transform: translate(2px, 2px);\n  box-shadow: 2px 2px 0 #000, 2px 2px 0 2px var(--accent);\n}\n\n.module-num {\n  width: 64px;\n  height: 64px;\n  display: grid;\n  place-items: center;\n  background: var(--accent);\n  color: #08040f;\n  font-family: var(--font-arcade);\n  font-size: 22px;\n  border: 3px solid #000;\n  box-shadow: inset 0 0 0 2px rgba(255,255,255,0.18);\n  position: relative;\n}\n\n.module-num::after {\n  content: \"\";\n  position: absolute;\n  inset: 4px;\n  border: 1px dashed rgba(0,0,0,0.18);\n  pointer-events: none;\n}\n\n.module-body {\n  display: flex;\n  flex-direction: column;\n  gap: 4px;\n  min-width: 0;\n}\n\n.module-label {\n  font-family: var(--font-arcade);\n  font-size: 9px;\n  letter-spacing: 0.18em;\n  color: var(--accent);\n  text-shadow: 0 0 6px color-mix(in oklab, var(--accent) 70%, transparent);\n}\n\n.module-title {\n  font-family: var(--font-mono);\n  font-size: 22px;\n  line-height: 1.05;\n  color: var(--ink);\n  letter-spacing: 0.02em;\n  word-break: break-word;\n}\n\n.module-arrow {\n  font-family: var(--font-arcade);\n  font-size: 18px;\n  color: var(--accent);\n  text-shadow: 0 0 10px color-mix(in oklab, var(--accent) 80%, transparent);\n  padding-right: 4px;\n  transition: transform 0.2s;\n}\n.module-tile:hover .module-arrow {\n  transform: translateX(4px);\n}\n\n/* Per-module accent assignment */\n.module-tile[data-i=\"1\"] { --accent: var(--yellow); }\n.module-tile[data-i=\"2\"] { --accent: var(--coral); }\n.module-tile[data-i=\"3\"] { --accent: var(--cyan); }\n.module-tile[data-i=\"4\"] { --accent: var(--purple); }\n.module-tile[data-i=\"5\"] { --accent: var(--green); }\n.module-tile[data-i=\"6\"] { --accent: var(--magenta); }\n\n/* ── Footer ───────────────────────────────────────────── */\n.foot {\n  margin-top: 28px;\n  display: flex;\n  flex-direction: column;\n  align-items: center;\n  gap: 6px;\n  font-family: var(--font-mono);\n  font-size: 16px;\n  color: var(--ink-dim);\n  letter-spacing: 0.06em;\n}\n.foot-version {\n  font-family: var(--font-arcade);\n  font-size: 9px;\n  letter-spacing: 0.18em;\n  color: var(--ink-dim);\n  opacity: 0.7;\n}\n.foot-author {\n  margin-top: 10px;\n  font-family: var(--font-arcade);\n  font-size: 10px;\n  letter-spacing: 0.16em;\n  color: var(--magenta);\n  text-shadow: 0 0 8px rgba(255, 46, 136, 0.45);\n  opacity: 0.9;\n}\n\n/* ── Floating particle dots (decorative pixels) ───────── */\n.pixel-dot {\n  position: absolute;\n  width: 6px;\n  height: 6px;\n  z-index: 1;\n  pointer-events: none;\n  animation: drift 8s ease-in-out infinite;\n}\n@keyframes drift {\n  0%, 100% { transform: translateY(0); opacity: 0.7; }\n  50%      { transform: translateY(-12px); opacity: 1; }\n}\n\n@media (max-width: 380px) {\n  .hero-logo-wrap { width: 280px; height: 280px; }\n  .hero-logo { width: 264px; height: 264px; }\n  .hero-wordmark { font-size: 18px; }\n
